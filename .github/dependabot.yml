version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 3
    groups:
      all-npm:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    cooldown:
      default-days: 7
    groups:
      all-actions:
        patterns:
          - "*"
