name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version was manually bumped
        id: check
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          # Check if tag already exists for this version
          if git rev-parse "v${CURRENT}" >/dev/null 2>&1; then
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CURRENT=$(node -p "require('./package.json').version")

          if [ "${{ steps.check.outputs.needs_bump }}" = "true" ]; then
            # Auto-increment patch
            IFS='.' read -r major minor patch <<< "$CURRENT"
            patch=$((patch + 1))
            VERSION="${major}.${minor}.${patch}"
            npm version "$VERSION" --no-git-tag-version
          else
            # Version was manually set and not yet tagged — use as-is
            VERSION="$CURRENT"
          fi

          # Check if this is a CI-triggered push (avoid infinite loop)
          LAST_AUTHOR=$(git log -1 --format='%an')
          if [ "$LAST_AUTHOR" = "github-actions[bot]" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit was from CI"
            exit 0
          fi

          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.check.outputs.needs_bump }}" = "true" ]; then
            git add package.json
            git commit -m "release: v${VERSION}"
          fi

          git tag "v${VERSION}"
          git push origin main --tags

  build:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package and publish
        run: pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
